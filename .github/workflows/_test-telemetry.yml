name: Telemetry Tests

on:
  workflow_call:
    inputs:
      checkout-ref:
        required: true
        type: string
      lifetime:
        required: true
        type: string
      publisher:
        required: true
        type: string
      cachingMode:
        required: true
        type: string
      metrics:
        required: true
        type: string
      dotnet-sdk:
        required: true
        type: string
      dotnet-framework:
        required: true
        type: string

permissions:
  contents: read

jobs:
  test-telemetry:
    name: Telemetry Tests ${{ inputs.dotnet-framework }}/${{ inputs.lifetime }}/${{ inputs.publisher }}/${{ inputs.cachingMode }}/metrics=${{ inputs.metrics }}
    runs-on: ubuntu-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.checkout-ref }}
          fetch-depth: 0 # depth is needed for nbgv

      - name: Setup .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: ${{ inputs.dotnet-sdk }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ inputs.dotnet-sdk }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', 'NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ inputs.dotnet-sdk }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Clean
        run: dotnet clean -v m

      - name: Build Mediator.Telemetry.Tests
        run: |
          DEFINES="Mediator_Lifetime_${{ inputs.lifetime }}%3BMediator_Publisher_${{ inputs.publisher }}%3BMediator_CachingMode_${{ inputs.cachingMode }}"
          if [ "${{ inputs.metrics }}" = "On" ]; then
            DEFINES="${DEFINES}%3BMediator_Telemetry_EnableMetrics%3BMediator_Telemetry_MeterName_Tests"
          fi
          dotnet build --no-restore -f ${{ inputs.dotnet-framework }} \
            -p:ExtraDefineConstants=\"${DEFINES}\" \
            -v m ./test/Mediator.Telemetry.Tests/

      - name: Test Mediator.Telemetry.Tests
        run: |
          dotnet test --no-restore -f ${{ inputs.dotnet-framework }} --no-build \
            --logger "console;verbosity=detailed" ./test/Mediator.Telemetry.Tests/
